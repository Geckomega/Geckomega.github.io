<!DOCTYPE html>
<html>

<head> 
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
</head>

<body>
  
<nav>
  <div class="nav-left">
    <img src="images/logo/logo.png">
  </div>

  <div class="nav-center">
    <a id="nav_about" href="#about"></a>
    <a id="nav_projects" href="#projects"></a>
    <a id="nav_contact" href="#contact"></a>
  </div>

  <div class="nav-right">
    <button id="lang-en" class="lang-btn">EN</button>
    <button id="lang-fr" class="lang-btn">FR</button>
  </div>
</nav>


<!-- ABOUT -->
<section id="about" class="active">
  <h2 id="about_title"></h2>
  <div class="about-grid">
    <div class="about-text">
      <p id="about_text"></p>
    </div>
    <video id="slideshow" autoplay muted playsinline></video>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2 id="projects_title"></h2>

  <div class="project">
    <h3 class="project-title">Rise of The Cult (GGJ 2026)</h3>

    <div class="project-grid">
      <div class="project-media">
        <img src="images/projects/riseofthecult/image1.png">
        <img src="images/projects/riseofthecult/image2.png">
        <img src="images/projects/riseofthecult/image3.png">
      </div>

      <div class="project-info">
        <div class="project-section">
          <h4>Overview</h4>
          <p id="project_overview"></p>
        </div>

        <div class="project-section">
          <h4>My Role</h4>
          <ul id="project_role"></ul>
        </div>

        <div class="project-section">
          <h4>Technical Breakdown</h4>
          <p id="project_technical"></p>
        </div>

        <div class="project-section">
          <h4>Challenges & Solutions</h4>
          <p id="project_challenges"></p>
        </div>

        <div class="project-section">
          <h4>What I'm Proud Of</h4>
          <ul id="project_proud"></ul>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 id="contact_title"></h2>

  <div class="contact-info">
    <h3 id="contact_reach"></h3>

    <div class="email-row">
      <p id="contact_email"></p>
      <a id="contact_email_button" class="email-button"></a>
    </div>

  </div>
</section>

<p id="disclaimer" class="disclaimer"></p>

<!-- JS -->
<script src="js/language.js"></script>
<script src="js/navigation.js"></script>
<script src="js/slideshow.js"></script>
<script src="js/main.js"></script>

</body>

</html>
